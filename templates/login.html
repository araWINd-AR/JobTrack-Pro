{% extends "base.html" %}
{% block content %}

<div class="auth-card">
    <h1>Login</h1>
    <p class="helper-text">Access your job tracker account.</p>

    <form method="POST" class="form-grid" style="grid-template-columns: 1fr;">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary full">Login</button>
    </form>

    <p class="helper-text" style="margin-top: 18px;">
        Don’t have an account?
        <a href="{{ url_for('register') }}">Create account</a>
    </p>
</div>

{% endblock %}
