{% extends "base.html" %}
{% block content %}

<div class="auth-card">
    <h1>Create Account</h1>
    <p class="helper-text">Start tracking your job applications.</p>

    <form method="POST" class="form-grid" style="grid-template-columns: 1fr;">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create password" required>
        </div>

        <button type="submit" class="btn btn-primary full">Create Account</button>
    </form>

    <p class="helper-text" style="margin-top: 18px;">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>

{% endblock %}
